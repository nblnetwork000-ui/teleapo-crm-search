services:
  - type: web
    name: teleapo-crm-search
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python3 app.py
    healthCheckPath: /login
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ALLOW_REMOTE_ACCESS
        value: true
      - key: REQUESTS_PER_15_MIN
        value: 1000
      - key: ACCESS_MEMBER_ID
        sync: false
      - key: ACCESS_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: YAHOO_CLIENT_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: 店舗リスト
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: VOICEVOX_SPEAKER
        value: 24
